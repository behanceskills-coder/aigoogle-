name: Daily News Bot

on:
  schedule:
    - cron: '30 2 * * *'  # రోజూ 8:00 AM IST (UTC 2:30)
  workflow_dispatch:       # Manual గా కూడా run చేయవచ్చు

jobs:
  fetch-and-save-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser google-generativeai google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Run News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: python daily_news_bot.py
